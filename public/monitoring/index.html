<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/monitoring/monitoring.css" />
  <title>Control Room - Monitoring</title>
  <meta name="description" content="Manajemen Servis & Dashboard Pemantauan CCTV" />
</head>
<body>
  <div class="monitoring-container">
    <!-- Camera Grid -->
    <div id="camera-grid" class="camera-grid"></div>

    <!-- Filter Bar (top-left, horizontal) -->
    <div class="filter-group glass-panel">
      <button id="toolbar-toggle" class="filter-toggle" aria-label="Filter">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.34-4.34"/>
        </svg>
      </button>

      <div id="toolbar-filters" class="toolbar-filters">
        <svg class="filter-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.34-4.34"/>
        </svg>
        <input id="search" type="text" class="filter-input" placeholder="Search kamera..." />
        <div class="filter-divider"></div>
        <select id="category-filter" class="filter-select"></select>
        <div class="filter-divider"></div>
        <select id="status-filter" class="filter-select"></select>
      </div>

      <span id="camera-count" class="camera-count"></span>
    </div>

    <!-- Nav Pill (top-right) -->
    <div class="nav-pill-container glass-panel">
      <a href="/dashboard" class="glass-pill">Dashboard</a>
    </div>

    <!-- Stats Panel -->
    <div id="stats" class="stats-panel glass-panel"></div>

    <!-- User Menu -->
    <div class="user-menu glass-panel">
      <div class="user-info">
        <div id="user-avatar" class="user-avatar">U</div>
        <div class="user-details">
          <div id="user-name" class="user-name">User</div>
          <div id="user-email" class="user-email">-</div>
        </div>
      </div>
      <button id="logout-btn" class="glass-btn logout-btn" aria-label="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" x2="9" y1="12" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/monitoring/monitoring.js"></script>
</body>
</html>
