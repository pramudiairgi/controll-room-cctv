<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="monitoring.css" />
  <title>Control Room - Monitoring</title>
  <meta name="description" content="Manajemen Servis & Dashboard Pemantauan CCTV" />
</head>
<body>
  <div class="monitoring-container">
    <nav class="nav-links">
      <a href="/dashboard" class="nav-link">Dashboard</a>
      <a href="/monitoring" class="nav-link active">Monitoring</a>
    </nav>

    <div id="toolbar" class="toolbar">
      <button id="toolbar-toggle" class="toolbar-toggle" aria-label="Filter">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.34-4.34"/>
        </svg>
      </button>

      <div id="toolbar-filters" class="toolbar-filters hidden">
        <div class="toolbar-divider"></div>
        <input id="search" type="text" class="filter-input" placeholder="Search kamera..." />
        <select id="category-filter" class="filter-select category-filter" aria-label="Filter kategori kamera"></select>
        <select id="status-filter" class="filter-select status-filter" aria-label="Filter status kamera"></select>
      </div>

      <span id="camera-count" class="camera-count"></span>
    </div>

    <div id="camera-grid" class="camera-grid"></div>
  </div>

  <script src="monitoring.js"></script>
</body>
</html>
