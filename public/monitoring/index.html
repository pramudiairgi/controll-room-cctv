<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <link rel="stylesheet" href="/css/shared.css" />
        <link rel="stylesheet" href="/monitoring/monitoring.css" />
        <title>Control Room - Monitoring</title>
        <meta
            name="description"
            content="Service Management & CCTV Monitoring Dashboard"
        />
    </head>
    <body>
        <!-- Skip link for keyboard navigation -->
        <a href="#camera-grid" class="skip-link">Skip to camera grid</a>

        <!-- Full-screen grid: lives in document flow, always fills viewport -->
        <div id="camera-grid" class="camera-grid" role="region" aria-label="Camera grid"></div>

        <!-- Floating navbar: fixed, z-index above grid, auto-hides after 3s -->
        <nav id="navbar" class="navbar" aria-label="Camera filters">
            <div class="navbar-inner glass-panel">
                <div class="search-row">
                    <svg
                        class="filter-icon"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.34-4.34" />
                    </svg>
                    <input
                        id="search"
                        type="text"
                        class="filter-input"
                        placeholder="Search camera..."
                    />
                </div>
                <div class="filter-divider"></div>
                <select id="category-filter" class="filter-select"></select>
                <div class="filter-divider"></div>
                <select id="status-filter" class="filter-select"></select>
                <div class="filter-divider"></div>
                <a href="/dashboard" class="navbar-link">Dashboard</a>
            </div>
            <span id="camera-count" class="camera-count"></span>
        </nav>

        <script src="/js/app.js"></script>
        <script src="/monitoring/monitoring.js"></script>
    </body>
</html>
