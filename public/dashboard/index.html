<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <link rel="stylesheet" href="/css/shared.css" />
        <link rel="stylesheet" href="/dashboard/dashboard.css" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <title>Control Room - Dashboard</title>
        <meta
            name="description"
            content="Service Management & CCTV Monitoring Dashboard"
        />
    </head>
    <body>
        <!-- Skip link for keyboard navigation -->
        <a href="#map" class="skip-link">Skip to map</a>

        <!-- Full Map -->
        <div id="map" role="application" aria-label="CCTV camera map"></div>

        <!-- Filter Bar (top center, horizontal capsule) -->
        <div class="filter-bar">
            <div class="filter-group glass-panel">
                <div class="search-row">
                    <svg
                        class="filter-icon"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.34-4.34" />
                    </svg>
                    <input
                        id="search"
                        type="text"
                        class="filter-input"
                        placeholder="Search camera..."
                    />
                </div>
                <div class="filter-divider"></div>
                <select id="category-filter" class="filter-select"></select>
                <div class="filter-divider"></div>
                <select id="status-filter" class="filter-select"></select>
            </div>
        </div>

        <!-- Navigation Menu (bottom center) -->
        <nav class="bottom-nav" aria-label="Navigation">
            <a href="/monitoring" class="glass-pill bottom-nav-link">
                <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
                Monitoring
            </a>
        </nav>

        <!-- User Menu (bottom left) -->
        <div class="user-menu">
            <button
                id="logout-btn"
                class="glass-btn logout-btn"
                aria-label="Logout"
            >
                <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" x2="9" y1="12" y2="12" />
                </svg>
            </button>
        </div>

        <!-- Overlay -->
        <div id="overlay" class="overlay"></div>

        <!-- Detail Panel -->
        <div
            id="detail-panel"
            class="detail-panel glass-panel"
            role="dialog"
            aria-label="Camera details"
        ></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="/js/app.js"></script>
        <script src="/dashboard/dashboard.js"></script>
    </body>
</html>
