<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/dashboard/dashboard.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <title>Control Room - Dashboard</title>
  <meta name="description" content="Manajemen Servis & Dashboard Pemantauan CCTV" />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="/icons/cctv-seeklogo.png" alt="Control Room" />
          <h1>Control Room</h1>
        </div>
        <div class="nav-links">
          <a href="/dashboard" class="nav-link active">Dashboard</a>
          <a href="/monitoring" class="nav-link">Monitoring</a>
        </div>
        <input id="search" type="text" class="search-input" placeholder="Search kamera..." />
        <div class="filter-group">
          <select id="category-filter" class="filter-select category-filter"></select>
        </div>
      </div>

      <div id="stats" class="sidebar-stats"></div>

      <div id="camera-list" class="camera-list"></div>

      <div class="user-menu">
        <div class="user-info">
          <div id="user-avatar" class="user-avatar">U</div>
          <div>
            <div id="user-name" class="user-name">User</div>
            <div id="user-email" class="user-email">-</div>
          </div>
        </div>
        <button id="logout-btn" class="logout-btn" aria-label="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" x2="9" y1="12" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <main class="map-container">
      <div id="map"></div>
    </main>
  </div>

  <div id="overlay" class="overlay"></div>
  <div id="detail-panel" class="detail-panel"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/app.js"></script>
  <script src="/dashboard/dashboard.js"></script>
</body>
</html>
