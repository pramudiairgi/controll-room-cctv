<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="/css/shared.css" />
        <link rel="stylesheet" href="/dashboard/dashboard.css" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <title>Control Room - Dashboard</title>
        <meta
            name="description"
            content="Service Management & CCTV Monitoring Dashboard"
        />
    </head>
    <body>
        <!-- Full Map -->
        <div id="map"></div>

        <!-- Filter Bar (top-left, horizontal) -->
        <div class="filter-bar">
            <div class="filter-group glass-panel">
                <svg
                    class="filter-icon"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.34-4.34" />
                </svg>
                <input
                    id="search"
                    type="text"
                    class="filter-input"
                    placeholder="Search camera..."
                />
                <div class="filter-divider"></div>
                <select id="category-filter" class="filter-select"></select>
                <div class="filter-divider"></div>
                <select id="status-filter" class="filter-select"></select>
                <div class="filter-divider"></div>
                <a href="/monitoring" class="glass-pill">Monitoring</a>
            </div>
        </div>

        <!-- User Menu -->
        <div class="user-menu glass-panel">
            <div class="user-info">
                <div id="user-avatar" class="user-avatar">U</div>
                <div class="user-details">
                    <div id="user-name" class="user-name">User</div>
                    <div id="user-email" class="user-email">-</div>
                </div>
            </div>
            <button
                id="logout-btn"
                class="glass-btn logout-btn"
                aria-label="Logout"
            >
                <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" x2="9" y1="12" y2="12" />
                </svg>
            </button>
        </div>

        <!-- Overlay -->
        <div id="overlay" class="overlay"></div>

        <!-- Detail Panel -->
        <div id="detail-panel" class="detail-panel glass-panel"></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="/js/app.js"></script>
        <script src="/dashboard/dashboard.js"></script>
    </body>
</html>
